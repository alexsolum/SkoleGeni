services:
  db:
    image: postgres:16
    container_name: skolegeni-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "54326:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  rest:
    image: postgrest/postgrest:v12.2.8
    container_name: skolegeni-rest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      # Local dev only. This stack is not a production auth substitute.
      PGRST_JWT_SECRET: local-jwt-secret-local-jwt-secret-local
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"

  kong:
    image: kong:3.6
    container_name: skolegeni-kong
    depends_on:
      - rest
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      # Supabase-like API base URL (supabase-js appends /rest/v1)
      - "54325:8000"
    volumes:
      - ./docker/kong.yml:/kong/kong.yml:ro

  optimizer:
    image: skolegeni-optimizer-local
    build:
      context: .
      dockerfile: docker/optimizer.Dockerfile
    container_name: skolegeni-optimizer
    ports:
      - "8000:8000"

  web:
    image: skolegeni-web-local
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: skolegeni-web
    depends_on:
      - kong
      - optimizer
    environment:
      # Supabase REST base (Kong). supabase-js will call ${url}/rest/v1/...
      VITE_SUPABASE_URL: http://localhost:54325
      # Local dev only placeholder key for the PostgREST demo stack. Replace with a proper project key outside local use.
      VITE_SUPABASE_ANON_KEY: local-dev-anon-key
      # Call the Python optimizer directly in local dev
      VITE_OPTIMIZER_URL: http://localhost:8000/
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  db_data:

